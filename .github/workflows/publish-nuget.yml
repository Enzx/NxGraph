name: Publish

on:
  push:
    tags:
      - "v*"
      - "serialization/v*"
      - "serialization-abstraction/v*"
      - "nxgraph/v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Which package(s) to publish: all | serialization | serialization-abstraction"
        required: true
        default: all
      version:
        description: "SemVer to publish (e.g., 1.2.3 or 1.2.3-beta.1). Required for manual runs."
        required: true

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: 1

jobs:
  pack-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      - name: Preflight — verify NuGet API key is available
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "::error::NUGET_API_KEY is not set or not visible to this workflow run."
            exit 1
          fi
          echo "::add-mask::$NUGET_API_KEY"
          echo "NuGet API key is present."

      - name: Publish (build, test, pack, push)
        env:
          TARGET: ${{ github.event.inputs.target }}
          VERSION: ${{ github.event.inputs.version }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          NUGET_SOURCE: https://api.nuget.org/v3/index.json
          ARTIFACTS_DIR: artifacts
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          REPO_BRANCH: ${{ github.ref_name }}
          REPO_COMMIT: ${{ github.sha }}
        run: dotnet run --project NxGraph.Build -- publish

      - name: List artifacts
        shell: bash
        run: ls -al artifacts/ || true

      - name: Validate package and symbol contents
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          echo "== Listing assemblies in nupkg =="
          for f in artifacts/*.nupkg; do
            echo "---- $(basename "$f")"
            unzip -l "$f" | grep -E '(^|/)(lib|ref|runtimes)/' || true
            echo "---- nuspec id/version ----"
            unzip -p "$f" "*.nuspec" | grep -E "<id>|<version>" || true
          done
          echo "== Listing PDBs in snupkg =="
          for f in artifacts/*.snupkg; do
            echo "---- $(basename "$f")"
            unzip -l "$f" | grep -E '\.pdb$' || true
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nuget-packages
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: ignore
